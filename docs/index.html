<style>
  :root{
    --paper:#efe9db; --paper-2:#e7e0cf; --card:#fbf8f1;
    --ink:#16302e; --ink-soft:#3f5a56;
    --amber:#cc5b22; --amber-dark:#a8481a; --teal:#2c6e6a; --muted:#8a7f68;
    --line:rgba(22,48,46,.14); --line-strong:rgba(22,48,46,.28);
    --shadow:0 1px 0 rgba(22,48,46,.05), 0 10px 24px -18px rgba(22,48,46,.45);
    --safe: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0; color:var(--ink); background:var(--paper);
    font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; line-height:1.5;
    background-image:radial-gradient(var(--line) 1px, transparent 1px); background-size:22px 22px;
    -webkit-tap-highlight-color:transparent}
  a{color:inherit}
  .wrap{max-width:1200px; margin:0 auto; padding:0 clamp(14px,4vw,20px)}
  .mono{font-family:"Space Mono",ui-monospace,Menlo,Consolas,monospace}
  .cond{font-family:"Saira Condensed",Inter,sans-serif}

  header{position:sticky; top:0; z-index:20;
    background:linear-gradient(var(--paper), rgba(239,233,219,.94));
    backdrop-filter:saturate(1.1) blur(6px); border-bottom:1px solid var(--line-strong)}
  .eyebrow{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--teal); margin:0 0 4px}
  .masthead{display:flex; flex-wrap:wrap; align-items:flex-end; gap:6px 18px; padding:16px 0 4px}
  h1{font-weight:800; letter-spacing:.01em; text-transform:uppercase; font-size:clamp(28px,6vw,46px); line-height:.95; margin:0}
  h1 .amp{color:var(--amber)}
  .subtitle{color:var(--ink-soft); font-size:14px; margin:2px 0 0}
  .summary{font-size:12px; color:var(--muted); margin-left:auto; white-space:nowrap; align-self:center}
  .summary b{color:var(--amber-dark)}
  @media (max-width:640px){ .summary{margin-left:0; width:100%; align-self:auto} }

  .toolbar{display:flex; flex-wrap:wrap; gap:10px; align-items:center; padding:12px 0 10px}
  .search{flex:1 1 240px; position:relative; min-width:180px}
  .search input{width:100%; padding:10px 34px 10px 34px; border:1px solid var(--line-strong);
    border-radius:8px; background:var(--card); color:var(--ink); font-family:inherit; font-size:15px}
  .search input:focus{outline:none; border-color:var(--amber)}
  .search .ico{position:absolute; left:10px; top:50%; transform:translateY(-50%); opacity:.5; pointer-events:none}
  .search .clear{position:absolute; right:6px; top:50%; transform:translateY(-50%); border:none; background:transparent;
    color:var(--muted); font-size:16px; cursor:pointer; padding:6px; line-height:1; border-radius:6px; display:none}
  .search .clear:hover{color:var(--ink)}
  .ctrl{font-size:12px; color:var(--ink); border:1px solid var(--line-strong); background:var(--card);
    border-radius:8px; padding:10px 12px; min-height:42px}
  .pricerange{display:inline-flex; align-items:center; gap:6px}
  .pricerange .dash{color:var(--muted); font-family:"Space Mono",monospace}
  .price-in{width:96px; font-family:"Space Mono",monospace; -moz-appearance:textfield}
  .price-in::-webkit-outer-spin-button,.price-in::-webkit-inner-spin-button{-webkit-appearance:none; margin:0}
  .price-in:focus{outline:none; border-color:var(--amber)}
  select.ctrl{cursor:pointer; font-family:"Space Mono",monospace}
  .toggle{display:inline-flex; align-items:center; gap:8px; user-select:none; cursor:pointer; font-family:"Space Mono",monospace}
  .toggle input{position:absolute; opacity:0; width:0; height:0}
  .sw{width:34px; height:18px; border-radius:10px; background:var(--line-strong); position:relative; transition:background .2s; flex:0 0 auto}
  .sw::after{content:""; position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%; background:#fff; transition:transform .2s}
  .toggle input:checked + .sw{background:var(--amber)}
  .toggle input:checked + .sw::after{transform:translateX(16px)}
  @media (max-width:520px){ .search{flex-basis:100%} .toggle.ctrl,select.ctrl{flex:1 1 auto; justify-content:center} }

  nav.index{display:flex; gap:8px; overflow-x:auto; padding:2px 0 14px; -webkit-overflow-scrolling:touch}
  nav.index::-webkit-scrollbar{height:6px}
  nav.index::-webkit-scrollbar-thumb{background:var(--line-strong); border-radius:3px}
  .tab{flex:0 0 auto; display:inline-flex; align-items:center; gap:8px; padding:8px 13px; border:1px solid var(--line-strong);
    border-radius:999px; background:transparent; color:var(--ink-soft); cursor:pointer; font-size:13px; font-weight:600;
    white-space:nowrap; transition:.15s; min-height:38px; font-family:inherit}
  .tab .cnt{font-family:"Space Mono",monospace; font-size:11px; color:var(--muted)}
  .tab .newdot{font-family:"Space Mono",monospace; font-size:10px; font-weight:700; color:#fff; background:var(--amber); border-radius:999px; padding:1px 6px}
  .tab:hover{border-color:var(--ink); color:var(--ink)}
  .tab[aria-selected="true"]{background:var(--ink); color:var(--paper); border-color:var(--ink)}
  .tab[aria-selected="true"] .cnt{color:rgba(239,233,219,.7)}
  .tab:focus-visible{outline:3px solid var(--amber); outline-offset:2px}

  .resultbar{font-family:"Space Mono",monospace; font-size:12px; color:var(--muted); padding:4px 0 14px; display:flex; align-items:center; gap:12px; flex-wrap:wrap}
  .resultbar .reset{border:none; background:transparent; color:var(--teal); font:inherit; cursor:pointer; text-decoration:underline; padding:0}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(258px,1fr)); gap:18px; padding-bottom:calc(48px + var(--safe))}
  .card{display:flex; flex-direction:column; background:var(--card); border:1px solid var(--line);
    border-radius:12px; overflow:hidden; text-decoration:none; box-shadow:var(--shadow);
    transition:transform .18s, box-shadow .18s, border-color .18s}
  @media (hover:hover){ .card:hover{transform:translateY(-3px); border-color:var(--line-strong); box-shadow:0 18px 34px -20px rgba(22,48,46,.5)} }
  .card:active{transform:translateY(-1px)}
  .card:focus-visible{outline:3px solid var(--amber); outline-offset:2px}
  .thumb{position:relative; aspect-ratio:4/3; background:var(--paper-2); overflow:hidden}
  .thumb img{width:100%; height:100%; object-fit:cover; display:block}
  .noimg{width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:var(--muted);
    font-family:"Space Mono",monospace; font-size:12px; letter-spacing:.08em;
    background-image:repeating-linear-gradient(45deg, rgba(22,48,46,.05) 0 8px, transparent 8px 16px)}
  .stamp{position:absolute; top:10px; left:10px; transform:rotate(-7deg); font-family:"Saira Condensed",sans-serif;
    font-weight:800; letter-spacing:.06em; font-size:13px; color:var(--amber); text-transform:uppercase;
    border:2px solid var(--amber); border-radius:4px; padding:2px 7px; background:rgba(251,248,241,.85); box-shadow:0 1px 0 rgba(168,72,26,.25)}
  .body{padding:12px 13px 13px; display:flex; flex-direction:column; gap:7px; flex:1}
  .ttl{font-weight:600; font-size:14.5px; color:var(--ink); line-height:1.32;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .price{font-family:"Space Mono",monospace; font-weight:700; font-size:15px; color:var(--amber-dark)}
  .foot{margin-top:auto; display:flex; align-items:center; justify-content:space-between; gap:8px; padding-top:4px}
  .chip{font-family:"Space Mono",monospace; font-size:10.5px; letter-spacing:.05em; text-transform:uppercase;
    color:var(--teal); border:1px solid var(--teal); border-radius:5px; padding:2px 6px; flex:0 0 auto}
  .loc{font-size:12.5px; color:var(--ink-soft); display:flex; align-items:center; gap:4px; min-width:0}
  .loc span{overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .meta{font-family:"Space Mono",monospace; font-size:11px; color:var(--muted); display:flex; flex-direction:column; gap:2px}

  .warnbar{margin:0 0 14px; padding:10px 12px; border:1px solid var(--amber); border-radius:8px;
    background:rgba(204,91,34,.10); color:var(--amber-dark); font-family:"Space Mono",monospace; font-size:12px; line-height:1.6}
  .stamp.drop{color:var(--teal); border-color:var(--teal); box-shadow:0 1px 0 rgba(44,110,106,.25);
    top:auto; bottom:10px; transform:rotate(-3deg)}
  .price .old{font-family:"Space Mono",monospace; font-weight:400; font-size:12px; color:var(--muted);
    text-decoration:line-through; margin-right:7px}
  .price .pct{font-size:11px; color:var(--teal); font-weight:700; margin-left:6px}
  .card.stale{opacity:.78}
  .card.stale .thumb::after{content:"non verificato oggi"; position:absolute; left:0; right:0; bottom:0;
    background:rgba(22,48,46,.72); color:var(--paper); font-family:"Space Mono",monospace; font-size:10px;
    letter-spacing:.06em; text-transform:uppercase; text-align:center; padding:3px 0}

  .favbtn{position:absolute; top:8px; right:8px; z-index:2; width:36px; height:36px; border-radius:50%;
    border:1px solid var(--line-strong); background:rgba(251,248,241,.92); color:var(--muted);
    font-size:18px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:.15s; padding:0}
  .favbtn:hover{color:var(--amber-dark); border-color:var(--amber)}
  .favbtn.on{color:#fff; background:var(--amber); border-color:var(--amber-dark)}
  .bottombar{display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:center;
    border-top:1px dashed var(--line-strong); margin:8px 0 0; padding:16px 0 8px}
  .chipbtn{font-family:"Space Mono",monospace; font-size:12px; border:1px solid var(--line-strong);
    background:var(--card); color:var(--ink-soft); border-radius:999px; padding:8px 13px; cursor:pointer; min-height:38px}
  .chipbtn:hover{border-color:var(--ink); color:var(--ink)}
  .chipbtn.on{background:var(--ink); color:var(--paper); border-color:var(--ink)}
  #selmode{cursor:pointer; font-family:"Space Mono",monospace}
  .card.sel{outline:3px solid var(--teal); outline-offset:2px}
  .card.sel .thumb::before{content:"✓"; position:absolute; top:8px; left:8px; z-index:3; width:26px; height:26px;
    border-radius:50%; background:var(--teal); color:#fff; font-weight:700; font-size:15px;
    display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px rgba(0,0,0,.25)}
  .card.sel .stamp{display:none}
  .selbar{position:fixed; left:50%; transform:translateX(-50%); bottom:calc(14px + var(--safe)); z-index:40;
    display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:center;
    background:var(--ink); color:var(--paper); border-radius:12px; padding:10px 14px; max-width:94vw;
    box-shadow:0 14px 34px -12px rgba(0,0,0,.55); font-family:"Space Mono",monospace; font-size:12px}
  .selbar button{font-family:inherit; font-size:12px; border-radius:8px; border:1px solid rgba(239,233,219,.35);
    background:transparent; color:var(--paper); padding:8px 11px; cursor:pointer; min-height:36px}
  .selbar button:hover{background:rgba(239,233,219,.12)}
  .selbar .primary{background:var(--amber); border-color:var(--amber-dark); font-weight:700}
  .toast{position:fixed; bottom:calc(70px + var(--safe)); left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:var(--paper); font-family:"Space Mono",monospace; font-size:13px;
    padding:11px 16px; border-radius:9px; box-shadow:0 12px 30px -12px rgba(0,0,0,.5); opacity:0;
    transition:.25s; pointer-events:none; z-index:50; max-width:90vw; text-align:center}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  .empty{grid-column:1/-1; text-align:center; padding:56px 20px; color:var(--ink-soft)}
  .empty h3{font-family:"Saira Condensed",sans-serif; text-transform:uppercase; letter-spacing:.02em; font-size:22px; margin:0 0 6px}

  footer{border-top:1px solid var(--line-strong); padding:16px 0 calc(40px + var(--safe)); color:var(--muted);
    font-size:12px; font-family:"Space Mono",monospace; display:flex; flex-wrap:wrap; gap:6px 16px; justify-content:space-between}

  @media (max-width:560px){ .grid{grid-template-columns:1fr 1fr; gap:12px} .ttl{font-size:13.5px} .stamp{font-size:12px} }
  @media (max-width:390px){ .grid{grid-template-columns:1fr} }

  @keyframes rise{from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)}}
  .card.enter{animation:rise .36s ease both}
  @media (prefers-reduced-motion:reduce){ .card{transition:none} .card.enter{animation:none} }
</style>
</head>

  <script>
  (function(){
    var SAMPLE = {
      generated_at:new Date().toISOString(), title:"Officina — Monitor annunci",
      subtitle:"Annunci aggregati di moto d'epoca e ricambi (dati di esempio)",
      total_current:3, total_new:2, total_drops:1, portal_issues:[],
      watches:[
        {name:"Kawasaki 350 S2", current:2, new:1, items:[
          {title:"Kawasaki 350 S2 del 1972, conservata e targhata", price:"9.500 €", location:"Verona", url:"#", portal:"Subito", image:"", first_seen:new Date().toISOString(), is_new:true, via:"diretta · Subito"},
          {title:"Kawasaki S2 350 progetto restauro, motore completo", price:"4.200 €", location:"Bologna", url:"#", portal:"Subito", image:"", first_seen:new Date(Date.now()-5*864e5).toISOString(), is_new:false, via:"invertita · Subito", price_drop_old:"4.800 €", price_drop_pct:12}
        ]},
        {name:"KTM 175 GS", current:1, new:1, items:[
          {title:"KTM 175 GS motore nero, conservata originale", price:"3.900 €", location:"Ragusa", url:"#", portal:"Subito", image:"", first_seen:new Date().toISOString(), is_new:true, via:"diretta · Subito"}
        ]}
      ]
    };

    var DATA;
    try { DATA = JSON.parse(document.getElementById('moto-data').textContent.trim()); if(!DATA || !DATA.watches) DATA = SAMPLE; }
    catch(e){ DATA = SAMPLE; }

    function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
    function pad(n){ return (n<10?'0':'')+n; }
    function fmtDate(iso){ var d=new Date(iso); return isNaN(d)?'':pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear(); }
    function fmtDateTime(iso){ var d=new Date(iso); return isNaN(d)?'':fmtDate(iso)+' '+pad(d.getHours())+':'+pad(d.getMinutes()); }
    // Parser prezzi europeo: "9.500 €"->9500, "120,00 EUR"->120, "45 €"->45.
    // Restituisce null se il prezzo non è leggibile.
    function numPrice(p){
      var s = String(p==null?'':p).replace(/[^\d.,]/g,'');
      if(!s) return null;
      if(s.indexOf('.')>-1 && s.indexOf(',')>-1){ s = s.replace(/\./g,'').replace(',', '.'); }
      else if(s.indexOf(',')>-1){ s = s.replace(/,/g, '.'); }
      else if(/\.\d{3}(\.\d{3})*$/.test(s)){ s = s.replace(/\./g,''); }
      var v = parseFloat(s);
      return isNaN(v) ? null : v;
    }
    function sortPrice(it, missing){ var v=numPrice(it.price); return v==null?missing:v; }

    document.getElementById('title').innerHTML = esc(DATA.title||'Officina — Monitor annunci').replace('—','<span class="amp">—</span>');
    document.getElementById('subtitle').textContent = DATA.subtitle||'';
    document.getElementById('summary').innerHTML = '<b>'+DATA.total_current+'</b> attivi · <b>'+DATA.total_new+'</b> nuovi'+(DATA.total_drops?' · <b>'+DATA.total_drops+'</b> ribassi':'')+'<br>agg. '+fmtDateTime(DATA.generated_at);
    document.getElementById('foot-left').textContent = DATA.total_current+' annunci attivi · '+DATA.total_new+' nuovi';
    (function(){
      var ports = {};
      (DATA.watches||[]).forEach(function(w){ (w.items||[]).forEach(function(it){ if(it.portal) ports[it.portal]=1; }); });
      var names = Object.keys(ports).sort();
      if(names.length) document.getElementById('foot-right').textContent = 'Generato automaticamente · dati da '+names.join(', ');
    })();

    // Avviso salute portali: distingue "nessun annuncio" da "portale non raggiunto"
    (function(){
      var issues = DATA.portal_issues || [];
      if(!issues.length) return;
      var down = issues.filter(function(i){return i.level==='down'}).map(function(i){return i.label});
      var partial = issues.filter(function(i){return i.level!=='down'}).map(function(i){return i.label});
      var parts = [];
      if(down.length) parts.push('senza risposta: <b>'+down.map(esc).join(', ')+'</b>');
      if(partial.length) parts.push('risposte parziali: <b>'+partial.map(esc).join(', ')+'</b>');
      var el = document.getElementById('warnbar');
      el.innerHTML = '⚠ Oggi ' + parts.join(' · ') + ' — l\'elenco potrebbe essere incompleto.';
      el.hidden = false;
    })();

    var state = { tab:"__all__", q:"", onlynew:false, onlyfav:false, sort:"recenti", pmin:"", pmax:"", selecting:false };
    var sel = {};

    // Preferiti: stelline salvate nel browser (localStorage), per dispositivo.
    var FAVKEY = 'motoMonitorPreferiti';
    function loadFavs(){ try { return JSON.parse(localStorage.getItem(FAVKEY)||'{}') || {}; } catch(e){ return {}; } }
    function saveFavs(f){ try { localStorage.setItem(FAVKEY, JSON.stringify(f)); } catch(e){} }
    var favs = loadFavs();
    function favId(it){ return it.url || it.title || ''; }

    // Annunci eliminati: nascosti subito su questo dispositivo e, se la pagina
    // è servita dal server locale, aggiunti alla blacklist del monitor.
    var HIDEKEY = 'motoMonitorNascosti';
    function loadHidden(){ try { return JSON.parse(localStorage.getItem(HIDEKEY)||'{}') || {}; } catch(e){ return {}; } }
    function saveHidden(h){ try { localStorage.setItem(HIDEKEY, JSON.stringify(h)); } catch(e){} }
    var hidden = loadHidden();
    var serverBl = {};
    try {
      fetch('/api/blacklist').then(function(r){ return r.ok ? r.json() : null; }).then(function(j){
        if(j && j.items){ j.items.forEach(function(e){ var u = e && e.url ? e.url : e; if(u) serverBl[u]=1; }); render(); }
      }).catch(function(){});
    } catch(e){}

    var BYID = {};
    DATA.watches.forEach(function(w){ (w.items||[]).forEach(function(it){ BYID[favId(it)] = it; }); });

    var toastTimer = null;
    function toast(msg){
      var t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function(){ t.className = 'toast'; }, 3600);
    }

    var tabsEl = document.getElementById('tabs');
    var allNew = DATA.watches.reduce(function(s,w){return s+(w.new||0)},0);
    var tabs = [{key:"__all__", name:"Tutti", current:DATA.total_current, new:allNew}]
      .concat(DATA.watches.map(function(w){return {key:w.name, name:w.name, current:w.current, new:w.new}}));
    tabs.forEach(function(t){
      var b=document.createElement('button');
      b.className='tab'; b.setAttribute('role','tab'); b.setAttribute('aria-selected', t.key===state.tab?'true':'false');
      b.innerHTML = esc(t.name)+' <span class="cnt">'+t.current+'</span>'+(t.new>0?' <span class="newdot">'+t.new+' nuovi</span>':'');
      b.addEventListener('click', function(){
        state.tab=t.key;
        [].forEach.call(tabsEl.children,function(c){c.setAttribute('aria-selected','false')});
        b.setAttribute('aria-selected','true'); render();
      });
      tabsEl.appendChild(b);
    });

    var qEl=document.getElementById('q'), clearEl=document.getElementById('clear');
    qEl.addEventListener('input', function(){ state.q=qEl.value; clearEl.style.display=qEl.value?'block':'none'; render(); });
    clearEl.addEventListener('click', function(){ qEl.value=''; state.q=''; clearEl.style.display='none'; render(); qEl.focus(); });
    document.getElementById('onlynew').addEventListener('change', function(e){ state.onlynew=e.target.checked; render(); });
    document.getElementById('sort').addEventListener('change', function(e){ state.sort=e.target.value; syncSortUi(); render(); });
    var pminEl=document.getElementById('pmin'), pmaxEl=document.getElementById('pmax');
    pminEl.addEventListener('input', function(){ state.pmin=pminEl.value; render(); });
    pmaxEl.addEventListener('input', function(){ state.pmax=pmaxEl.value; render(); });

    // ---- Preferiti e barra comandi in fondo alla pagina ----
    function syncSortUi(){
      document.getElementById('sort').value = state.sort;
      [].forEach.call(document.querySelectorAll('#bottombar .chipbtn[data-sort]'), function(b){
        b.classList.toggle('on', b.getAttribute('data-sort')===state.sort);
      });
    }
    function syncFavUi(){
      document.getElementById('onlyfav').checked = state.onlyfav;
      document.getElementById('bfav').classList.toggle('on', state.onlyfav);
    }
    document.getElementById('onlyfav').addEventListener('change', function(e){ state.onlyfav=e.target.checked; syncFavUi(); render(); });
    [].forEach.call(document.querySelectorAll('#bottombar .chipbtn[data-sort]'), function(b){
      b.addEventListener('click', function(){
        state.sort=b.getAttribute('data-sort'); syncSortUi(); render();
        window.scrollTo({top:0, behavior:'smooth'});
      });
    });
    document.getElementById('bfav').addEventListener('click', function(){
      state.onlyfav=!state.onlyfav; syncFavUi(); render();
      window.scrollTo({top:0, behavior:'smooth'});
    });
    document.getElementById('btop').addEventListener('click', function(){ window.scrollTo({top:0, behavior:'smooth'}); });

    // ---- Multi-selezione: bulk preferiti / elimina (blacklist) ----
    function updateSelbar(){
      var n = Object.keys(sel).length;
      document.getElementById('selcount').textContent = n + (n===1 ? ' selezionato' : ' selezionati');
    }
    function setSelecting(on){
      state.selecting = on;
      if(!on) sel = {};
      document.getElementById('selbar').hidden = !on;
      document.getElementById('selmode').textContent = on ? 'Fine selezione' : 'Seleziona';
      document.getElementById('bsel').classList.toggle('on', on);
      updateSelbar(); render();
    }
    document.getElementById('selmode').addEventListener('click', function(){ setSelecting(!state.selecting); });
    document.getElementById('bsel').addEventListener('click', function(){ setSelecting(!state.selecting); window.scrollTo({top:0, behavior:'smooth'}); });
    document.getElementById('selcancel').addEventListener('click', function(){ setSelecting(false); });
    document.getElementById('selfav').addEventListener('click', function(){
      var n = 0;
      for(var k in sel){ if(!favs[k]){ favs[k]=1; n++; } }
      saveFavs(favs);
      toast(n ? ('Aggiunti '+n+' annunci ai preferiti') : 'Erano già tutti nei preferiti');
      setSelecting(false);
    });
    document.getElementById('selhide').addEventListener('click', function(){
      var urls = Object.keys(sel);
      if(!urls.length){ toast('Nessun annuncio selezionato'); return; }
      urls.forEach(function(u){ hidden[u] = 1; });
      saveHidden(hidden);
      var payload = urls.map(function(u){ var it = BYID[u] || {}; return { url:u, title:it.title||'', portal:it.portal||'' }; });
      setSelecting(false);
      try {
        fetch('/api/blacklist', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({items:payload}) })
          .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
          .then(function(j){ toast('Eliminati '+urls.length+' annunci: in blacklist, il monitor non li riproporrà ('+j.total+' totali)'); })
          .catch(function(){ toast('Nascosti '+urls.length+' annunci su questo dispositivo. Per la blacklist definitiva usa la vista dal server locale.'); });
      } catch(e){ toast('Nascosti '+urls.length+' annunci su questo dispositivo.'); }
    });

    // Clic sulle schede: in selezione scelgo, altrimenti gestisco la stellina
    document.getElementById('grid').addEventListener('click', function(ev){
      if(state.selecting){
        var card = ev.target && ev.target.closest ? ev.target.closest('a.card') : null;
        if(card){
          ev.preventDefault(); ev.stopPropagation();
          var fid = card.getAttribute('data-fid') || '';
          if(sel[fid]) delete sel[fid]; else sel[fid] = 1;
          card.classList.toggle('sel', !!sel[fid]);
          updateSelbar();
        }
        return;
      }
      var b = ev.target && ev.target.closest ? ev.target.closest('.favbtn') : null;
      if(!b) return;
      ev.preventDefault(); ev.stopPropagation();
      var id = b.getAttribute('data-fid') || '';
      if(favs[id]) delete favs[id]; else favs[id]=1;
      saveFavs(favs);
      b.classList.toggle('on', !!favs[id]);
      b.setAttribute('aria-pressed', favs[id] ? 'true' : 'false');
      if(state.onlyfav) render();
    });

    function collect(){
      var list=[];
      DATA.watches.forEach(function(w){ if(state.tab==="__all__"||state.tab===w.name){ w.items.forEach(function(it){ list.push(it); }); } });
      list=list.filter(function(it){ var k=favId(it); return !hidden[k] && !serverBl[k]; });
      if(state.onlynew) list=list.filter(function(it){return it.is_new});
      if(state.onlyfav) list=list.filter(function(it){return favs[favId(it)]});
      var n=state.q.trim().toLowerCase();
      if(n) list=list.filter(function(it){ return (it.title||'').toLowerCase().indexOf(n)>-1 || (it.location||'').toLowerCase().indexOf(n)>-1; });
      // Fascia di prezzo: con un limite attivo gli annunci senza prezzo leggibile sono esclusi
      var pmin = state.pmin!=='' && state.pmin!=null ? parseFloat(state.pmin) : null;
      var pmax = state.pmax!=='' && state.pmax!=null ? parseFloat(state.pmax) : null;
      if(pmin!=null || pmax!=null){
        list=list.filter(function(it){
          var v=numPrice(it.price);
          if(v==null) return false;
          if(pmin!=null && v<pmin) return false;
          if(pmax!=null && v>pmax) return false;
          return true;
        });
      }
      list.sort(function(a,b){
        if(state.sort==="prezzo") return sortPrice(a, Number.MAX_SAFE_INTEGER)-sortPrice(b, Number.MAX_SAFE_INTEGER);
        if(state.sort==="prezzo-desc") return sortPrice(b, -1)-sortPrice(a, -1);
        if(state.sort==="az") return (a.title||'').localeCompare(b.title||'','it');
        if(state.sort==="giorni") return (a.first_seen||'9999').localeCompare(b.first_seen||'9999');
        if(state.sort==="ribassi"){
          var d=(b.price_drop_old?1:0)-(a.price_drop_old?1:0);
          if(d) return d;
        }
        return (b.first_seen||'').localeCompare(a.first_seen||'');
      });
      return list;
    }

    function render(){
      var items=collect(), grid=document.getElementById('grid');
      var filtered = state.q.trim()||state.onlynew||state.onlyfav||state.tab!=="__all__"||state.pmin!==''||state.pmax!=='';
      var rangeTxt = (state.pmin!==''||state.pmax!=='')
        ? ' · prezzo '+(state.pmin!==''?state.pmin:'0')+'–'+(state.pmax!==''?state.pmax:'∞')+' €' : '';
      var hc = Object.keys(hidden).length;
      document.getElementById('resultbar').innerHTML =
        '<span>'+items.length+(items.length===1?' annuncio':' annunci')+(state.onlynew?' · solo nuovi':'')+(state.onlyfav?' · preferiti':'')+rangeTxt+(state.q.trim()?' · «'+esc(state.q.trim())+'»':'')+'</span>'+
        (filtered?'<button class="reset" id="reset">azzera filtri</button>':'')+
        (hc?'<button class="reset" id="unhide">ripristina '+hc+' nascosti</button>':'');
      grid.innerHTML='';

      if(!items.length){
        var tot=DATA.watches.reduce(function(s,w){return s+w.items.length},0);
        grid.innerHTML = tot===0
          ? '<div class="empty"><h3>Nessun annuncio ancora</h3><p>Il monitor controlla i portali ogni giorno: qui compariranno le moto e i ricambi trovati.</p></div>'
          : '<div class="empty"><h3>Nessun risultato</h3><p>Prova a togliere i filtri o a cambiare ricerca.</p></div>';
      } else {
        var frag=document.createDocumentFragment();
        items.forEach(function(it,i){
          var a=document.createElement('a');
          a.className='card enter'; a.href=it.url||'#';
          a.setAttribute('data-fid', favId(it));
          if(state.selecting && sel[favId(it)]) a.className+=' sel';
          if(it.url && it.url!=='#'){ a.target='_blank'; a.rel='noopener'; }
          a.style.animationDelay=Math.min(i*26,340)+'ms';
          var thumb = it.image
            ? '<img class="thumb-img" loading="lazy" src="'+esc(it.image)+'" alt="'+esc(it.title)+'">'
            : '<div class="noimg">senza foto</div>';
          var stamp = (it.is_new?'<div class="stamp">Nuovo</div>':'')+(it.price_drop_old?'<div class="stamp drop">Prezzo ↓</div>':'');
          var loc = it.location
            ? '<span class="loc"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-5.2-7-11a7 7 0 1 1 14 0c0 5.8-7 11-7 11z"/><circle cx="12" cy="10" r="2.6"/></svg><span>'+esc(it.location)+'</span></span>'
            : '<span></span>';
          var priceHtml = (it.price_drop_old?'<span class="old">'+esc(it.price_drop_old)+'</span>':'')
            + esc(it.price||'n.d.')
            + (it.price_drop_pct?'<span class="pct">−'+esc(it.price_drop_pct)+'%</span>':'');
          var days = null;
          if(it.first_seen){ var fd=new Date(it.first_seen); if(!isNaN(fd)) days=Math.max(0, Math.floor((Date.now()-fd.getTime())/864e5)); }
          var seenTxt = it.first_seen ? 'primo avvistamento '+fmtDate(it.first_seen)+(days===0?' · oggi':(days!=null?' · da '+days+' g':'')) : '';
          if(it.stale) seenTxt = (seenTxt? seenTxt+' · ':'') + 'non verificato oggi';
          if(it.stale) a.className += ' stale';
          var favOn = !!favs[favId(it)];
          var favB = '<button class="favbtn'+(favOn?' on':'')+'" data-fid="'+esc(favId(it))+'"'+
            ' aria-pressed="'+(favOn?'true':'false')+'" title="Aggiungi o togli dai preferiti">★</button>';
          a.innerHTML='<div class="thumb">'+thumb+stamp+favB+'</div><div class="body">'+
            '<div class="ttl">'+esc(it.title)+'</div>'+
            '<div class="price">'+priceHtml+'</div>'+
            '<div class="foot">'+loc+'<span class="chip">'+esc(it.portal)+'</span></div>'+
            '<div class="meta">'+(seenTxt?'<span>'+seenTxt+'</span>':'')+(it.via?'<span>trovato con '+esc(it.via)+'</span>':'')+'</div>'+
            '</div>';
          frag.appendChild(a);
        });
        grid.appendChild(frag);
        grid.querySelectorAll('img.thumb-img').forEach(function(img){
          img.onerror=function(){ img.outerHTML='<div class="noimg">senza foto</div>'; };
        });
      }
      var reset=document.getElementById('reset');
      if(reset) reset.addEventListener('click', function(){
        state.tab="__all__"; state.q=""; state.onlynew=false; state.onlyfav=false; state.pmin=""; state.pmax="";
        pminEl.value=''; pmaxEl.value=''; syncFavUi();
        qEl.value=''; clearEl.style.display='none'; document.getElementById('onlynew').checked=false;
        [].forEach.call(tabsEl.children,function(c,idx){ c.setAttribute('aria-selected', idx===0?'true':'false'); });
        render();
      });
      var unhide=document.getElementById('unhide');
      if(unhide) unhide.addEventListener('click', function(){
        hidden={}; saveHidden(hidden); render();
        toast('Nascosti ripristinati su questo dispositivo (la blacklist del monitor non cambia)');
      });
    }

    syncSortUi();
    render();
  })();
  </script>
</body>
</html>
