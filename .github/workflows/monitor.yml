name: Moto Monitor

# Esecuzione automatica giornaliera + pulsante manuale.
on:
  schedule:
    - cron: "0 7 * * *"     # 07:00 UTC (~08:00/09:00 ora italiana). Modifica se vuoi.
  workflow_dispatch: {}      # avvio manuale dalla scheda "Actions"

permissions:
  contents: write            # serve per salvare state.json aggiornato nel repo

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui il monitor
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Salva stato e web app aggiornati
        run: |
          git config user.name "moto-monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json report.md report.html docs/index.html searches.json || true
          git commit -m "Aggiornamento $(date -u +%F)" || echo "Nessuna modifica da salvare"
          git push || echo "Push non necessario"
